name: Build x86-64

on:
  push:
    tags: ['v*']
  # Pull requests only trigger on changes to build-affecting files,
  # not on doc/config/profile-only changes.
  pull_request:
    branches: [main]
    paths:
      - 'build.sh'
      - 'kernel/**'
      - 'patches/**'
      - 'configs/**'
      - 'scripts/**'
      - '.github/workflows/build-x86.yml'
  # Manual trigger for on-demand builds
  workflow_dispatch:
    inputs:
      branch:
        description: 'XanMod branch (MAIN/EDGE/LTS/RT)'
        required: false
        default: 'MAIN'
      mlevel:
        description: 'x86-64 microarch level (v1/v2/v3/v4)'
        required: false
        default: 'v3'

env:
  XANMOD_BRANCH: ${{ github.event.inputs.branch || 'MAIN' }}
  MLEVEL: ${{ github.event.inputs.mlevel || 'v3' }}

jobs:
  build:
    name: "XanMod ${{ matrix.branch }} x86-64-${{ matrix.mlevel }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        branch: [MAIN, LTS]
        mlevel: [v2, v3]
        include:
          - branch: EDGE
            mlevel: v3
          - branch: RT
            mlevel: v3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential bc bison flex libssl-dev libelf-dev \
            libncurses-dev dwarves pahole cpio zstd lz4 \
            git wget curl

      - name: Fetch XanMod kernel source
        run: |
          BRANCH=${{ matrix.branch }} ./kernel/fetch.sh ${{ matrix.branch }}

      - name: Apply patches
        run: |
          ENABLE_ROG=0 \
          ENABLE_MEDIATEK_BT=0 \
          ENABLE_FS_PATCHES=0 \
          ENABLE_NET_PATCHES=0 \
          ENABLE_CACHY=0 \
          ENABLE_PARALLEL_BOOT=0 \
          ./scripts/apply-patches.sh kernel/src patches

      - name: Merge config fragments
        run: |
          cd kernel/src
          MERGE="./scripts/kconfig/merge_config.sh"
          FRAGS=(
            "../../configs/base/x86-64-${{ matrix.mlevel }}.config"
            "../../configs/features/performance.config"
            "../../configs/features/no-debug.config"
          )
          [[ "${{ matrix.branch }}" == "RT" ]] && \
            FRAGS+=("../../configs/features/rt.config")
          bash "${MERGE}" -m .config "${FRAGS[@]}"
          make -j$(nproc) ARCH=x86 olddefconfig

      - name: Build kernel
        run: |
          cd kernel/src
          make -j$(nproc) ARCH=x86 bindeb-pkg

      - name: Collect artifacts
        run: |
          mkdir -p dist
          find . -maxdepth 2 -name "*.deb" -exec cp {} dist/ \;
          ls -lh dist/

      - name: Upload .deb packages
        uses: actions/upload-artifact@v4
        with:
          name: xanmod-${{ matrix.branch }}-x86-64-${{ matrix.mlevel }}-deb
          path: dist/*.deb
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.deb
          generate_release_notes: true
