name: Build ARM64

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]
    paths:
      - 'build.sh'
      - 'kernel/**'
      - 'patches/**'
      - 'configs/base/aarch64.config'
      - 'scripts/**'
      - '.github/workflows/build-arm64.yml'
  workflow_dispatch:
    inputs:
      branch:
        description: 'XanMod branch (MAIN/EDGE/LTS/RT)'
        required: false
        default: 'MAIN'

jobs:
  build:
    name: "XanMod ${{ matrix.branch }} arm64"
    runs-on: ubuntu-24.04-arm
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        branch: [MAIN, LTS]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential bc bison flex libssl-dev libelf-dev \
            libncurses-dev dwarves pahole cpio zstd lz4 git
      - name: Fetch XanMod kernel source
        run: ./kernel/fetch.sh ${{ matrix.branch }}
      - name: Apply patches
        run: |
          ENABLE_ROG=0 ENABLE_MEDIATEK_BT=0 ENABLE_FS_PATCHES=0 \
          ENABLE_NET_PATCHES=0 ENABLE_CACHY=0 ENABLE_PARALLEL_BOOT=0 \
          ./scripts/apply-patches.sh kernel/src patches
      - name: Merge config fragments
        run: |
          cd kernel/src
          bash ./scripts/kconfig/merge_config.sh -m .config \
            ../../configs/base/aarch64.config \
            ../../configs/features/performance.config \
            ../../configs/features/no-debug.config
          make -j$(nproc) ARCH=arm64 olddefconfig
      - name: Build kernel
        run: cd kernel/src && make -j$(nproc) ARCH=arm64 bindeb-pkg
      - name: Collect & upload artifacts
        run: mkdir -p dist && find . -maxdepth 2 -name "*.deb" -exec cp {} dist/ \;
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # ratchet:actions/upload-artifact@v4
        with:
          name: xanmod-${{ matrix.branch }}-arm64-deb
          path: dist/*.deb
          retention-days: 30
