name: Build x86-64

# Full kernel builds are expensive (1-3 hours, large runner resources).
# Runs ONLY on tag pushes, manual dispatch, or PRs touching build-affecting files.
# For routine PRs (docs, profiles, packaging), lint.yml runs instead.

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]
    paths:
      - 'build.sh'
      - 'kernel/**'
      - 'patches/**'
      - 'configs/**'
      - 'scripts/**'
      - '.github/workflows/build-x86.yml'
  workflow_dispatch:
    inputs:
      branch:
        description: 'XanMod branch (MAIN/EDGE/LTS/RT)'
        required: false
        default: 'MAIN'
      mlevel:
        description: 'x86-64 microarch level (v1/v2/v3/v4)'
        required: false
        default: 'v3'

jobs:
  build:
    name: "XanMod ${{ matrix.branch }} x86-64-${{ matrix.mlevel }}"
    if: github.repository == 'Interested-Deving-1896/xanmod-unified-kernel'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        branch: [MAIN, LTS]
        mlevel: [v2, v3]
        include:
          - branch: EDGE
            mlevel: v3
          - branch: RT
            mlevel: v3
    steps:
      - uses: jfrog-fastci/fastci@2c2686537a7647c727d20c955b26bb7ce6dea6d4 # ratchet:jfrog-fastci/fastci@v0
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential bc bison flex libssl-dev libelf-dev \
            libncurses-dev dwarves pahole cpio zstd lz4 git wget curl \
            debhelper-compat=12 libdw-dev:native rsync libelf-dev \
            debhelper libglib2.0-dev
      - name: Compute cache key
        run: echo "YEAR_WEEK=$(date -u '+%Y-W%V')" >> "$GITHUB_ENV"
      - name: Restore kernel source cache
        id: cache-kernel
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # ratchet:actions/cache@v4
        with:
          path: kernel/src
          # Keyed on branch + year-week so the cache refreshes weekly
          # to pick up new upstream commits.
          key: xanmod-kernel-${{ matrix.branch }}-${{ env.YEAR_WEEK }}
          restore-keys: |
            xanmod-kernel-${{ matrix.branch }}-
      - name: Fetch XanMod kernel source
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        run: ./kernel/fetch.sh ${{ matrix.branch }}
      - name: Apply patches
        run: |
          ENABLE_ROG=0 ENABLE_MEDIATEK_BT=0 ENABLE_FS_PATCHES=0 \
          ENABLE_NET_PATCHES=0 ENABLE_CACHY=0 ENABLE_PARALLEL_BOOT=0 \
          ./scripts/apply-patches.sh kernel/src patches
      - name: Merge config fragments
        run: |
          cd kernel/src
          FRAGS=("../../configs/base/x86-64-${{ matrix.mlevel }}.config"
                 "../../configs/features/performance.config"
                 "../../configs/features/no-debug.config")
          [[ "${{ matrix.branch }}" == "RT" ]] && FRAGS+=("../../configs/features/rt.config")
          bash ./scripts/kconfig/merge_config.sh -m .config "${FRAGS[@]}"
          make -j$(nproc) ARCH=x86 olddefconfig
      - name: Build kernel
        run: cd kernel/src && make -j$(nproc) ARCH=x86 bindeb-pkg
      - name: Collect & upload artifacts
        run: mkdir -p dist && find . -maxdepth 2 -name "*.deb" -exec cp {} dist/ \;
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # ratchet:actions/upload-artifact@v4
        with:
          name: xanmod-${{ matrix.branch }}-x86-64-${{ matrix.mlevel }}-deb
          path: dist/*.deb
          retention-days: 30

  release:
    needs: build
    if: github.repository == 'Interested-Deving-1896/xanmod-unified-kernel' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: jfrog-fastci/fastci@2c2686537a7647c727d20c955b26bb7ce6dea6d4 # ratchet:jfrog-fastci/fastci@v0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # ratchet:actions/download-artifact@v4
        with: {path: dist/}
      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # ratchet:softprops/action-gh-release@v2
        with:
          files: dist/**/*.deb
          generate_release_notes: true
