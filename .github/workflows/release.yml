name: Release

on:
  push:
    tags: ['v*']

# Triggered after build-x86 and build-arm64 complete on a tag push.
# Collects all artifacts and publishes a GitHub Release with:
#   - .deb packages (x86-64 v2/v3, arm64)
#   - .pkg.tar.zst (Arch, built separately — see build-arch job below)
#   - SHA256 checksums

jobs:
  build-arch:
    name: "Build Arch .pkg.tar.zst (${{ matrix.branch }})"
    if: github.repository == 'Interested-Deving-1896/xanmod-unified-kernel'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        branch: [MAIN, LTS]

    container:
      image: index.docker.io/library/archlinux@sha256:8435d30c1462f94345c3894ebbeaeecd658fcb284aa41b0bcc5f88728933447f # ratchet:archlinux:latest

    steps:
      - uses: jfrog-fastci/fastci@2c2686537a7647c727d20c955b26bb7ce6dea6d4 # ratchet:jfrog-fastci/fastci@v0
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel bc bison flex openssl libelf pahole \
            cpio zstd lz4 git wget

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4

      - name: Compute cache key
        run: echo "YEAR_WEEK=$(date -u '+%Y-W%V')" >> "$GITHUB_ENV"
      - name: Restore kernel source cache
        id: cache-kernel
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # ratchet:actions/cache@v4
        with:
          path: kernel/src
          key: xanmod-kernel-${{ matrix.branch }}-${{ env.YEAR_WEEK }}
          restore-keys: |
            xanmod-kernel-${{ matrix.branch }}-
      - name: Fetch kernel source
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        run: ./kernel/fetch.sh ${{ matrix.branch }}

      - name: Apply patches + merge config
        run: |
          ENABLE_ROG=0 ENABLE_MEDIATEK_BT=0 ENABLE_FS_PATCHES=0 \
          ENABLE_NET_PATCHES=0 ENABLE_CACHY=0 ENABLE_PARALLEL_BOOT=0 \
          ./scripts/apply-patches.sh kernel/src patches
          cd kernel/src
          bash ./scripts/kconfig/merge_config.sh -m .config \
            ../../configs/base/x86-64-v3.config \
            ../../configs/features/performance.config \
            ../../configs/features/no-debug.config
          make -j$(nproc) ARCH=x86 olddefconfig

      - name: Build + package
        run: |
          cd kernel/src
          make -j$(nproc) ARCH=x86 pacman-pkg

      - name: Collect artifacts
        run: |
          mkdir -p dist
          find . -name "*.pkg.tar.zst" -exec cp {} dist/ \;

      - name: Upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # ratchet:actions/upload-artifact@v4
        with:
          name: xanmod-${{ matrix.branch }}-arch-pkg
          path: dist/*.pkg.tar.zst

  publish:
    name: Publish Release
    needs: [build-arch]
    if: github.repository == 'Interested-Deving-1896/xanmod-unified-kernel'
    runs-on: ubuntu-latest

    steps:
      - uses: jfrog-fastci/fastci@2c2686537a7647c727d20c955b26bb7ce6dea6d4 # ratchet:jfrog-fastci/fastci@v0
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # ratchet:actions/download-artifact@v4
        with:
          path: dist/

      - name: Generate checksums
        run: |
          find dist/ -type f | sort | xargs sha256sum > dist/SHA256SUMS
          cat dist/SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # ratchet:softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.deb
            dist/**/*.pkg.tar.zst
            dist/SHA256SUMS
          generate_release_notes: true
          body: |
            ## XanMod Unified Kernel Release

            ### Packages included
            | File | Distro | Arch |
            |------|--------|------|
            | `*-x86-64-v2-*.deb` | Debian/Ubuntu | x86-64 (SSE4.2+) |
            | `*-x86-64-v3-*.deb` | Debian/Ubuntu | x86-64 (AVX2+) |
            | `*-arm64-*.deb`     | Debian/Ubuntu | ARM64 |
            | `*.pkg.tar.zst`     | Arch Linux    | x86-64 |

            ### Install
            See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md)
            for installation instructions per distro.

            ### Verify checksums
            ```
            sha256sum -c SHA256SUMS
            ```
